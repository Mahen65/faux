services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: faux
      POSTGRES_PASSWORD: faux
      POSTGRES_DB: faux
    ports:
      - "5432:5432"
    volumes:
      - faux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faux"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@faux.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
      FAUX_DATABASE_URL: postgresql+asyncpg://faux:faux@db:5432/faux
      FAUX_LLM_API_KEY: ${FAUX_LLM_API_KEY:-}
      FAUX_LLM_PROVIDER: ${FAUX_LLM_PROVIDER:-anthropic}
    depends_on:
      db:
        condition: service_healthy

volumes:
  faux_pgdata:

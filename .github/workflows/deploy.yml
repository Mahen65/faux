name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy faux-backend \
            --source ./backend \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "FAUX_DATABASE_URL=${{ secrets.FAUX_DATABASE_URL }},FAUX_LLM_PROVIDER=anthropic" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --project ${{ secrets.GCP_PROJECT_ID }}
